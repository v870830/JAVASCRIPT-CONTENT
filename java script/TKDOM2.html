<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hello{
            color:red;
            background-color: blue;
        }
    </style>
</head>
<body>
    <p id="demo">this is new paragraph</p>
    <p id="demo2">this change when you called the function</p>
    <button onclick="myFunction()">click me </button>
    <script>
        document.getElementById("demo").style.cssText="color:red;background:green"
        function myFunction(){
            document.getElementById("demo2").classList.add("hello")
        }
        console.log(document.title)
        console.log(document.images)
        console.log(document.link)

    </script>
</body>
</html>
