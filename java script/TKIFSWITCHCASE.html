<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <P id="demo"></P>
     <script>
        let day=7;
        let dayname;
        switch (day){                                     
            case 1:
            dayname="Monday"
            break;
            case 2:
            dayname="Tuesday"
            break;
            case 3:
            dayname="Wednesday"
            break;
            case 4:
            dayname="Thurusday"
            break;
            case 5:
            dayname="Friday"
            break;
            case 6:
            dayname="Saturday"
            break;
            case 7:
            dayname="Sunday"
            break;
            default:
            dayname ="Invalid day number"
            break; 
        }
        document.getElementById("demo").innerHTML=dayname;
    </script>
