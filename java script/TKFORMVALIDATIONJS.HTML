<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form onsubmit="return myFunction()">  
        <label for="username">Enter your username</label><br>
        <input type="text" id="name"><br>
        <label for="password">Enter your password</label><br>
        <input type="password" id="password"><br>
        <label for="email">Enter your email</label><br>
        <input type="email" id="email"><br>

        <input type="submit"  value="submit">
    </form>
    <script>
        function myFunction(){
            let name=document.getElementById("name").value //to get value for that like as name 
            let email=document.getElementById("email").value
            let password=document.getElementById("password").value
            let namePattern=/^[A-Za-z ]+$/    //(regular expression ) here the condition which write uneder this function[] $use for close this
            //here namepattern is a just variable space is also incluided
            //here ^symobol show a string means string will be present in it
            if (name===""){
                alert("Please enter your name")
                return false;
            }
            if (!name.match(namePattern)){       //here are some condition which we can write
                alert("username  contain only letters")
                return false;
            }
            if (email===""){
                alert("Please enter your email")
                return false;
            }
            if (password===""){
            alert("please enter your password")
            return false;
        }
            if (password.length<6){
                alert("please enter the password greater than 6")
                return false;
            }
            alert("your form is submitted")
            return true
              
        }
    </script>
</body>
</html>
