<!DOCTYPE html>
<html>
<head>
<title>Mouse Hover Example</title>
<script>
function mouseout() {
  document.getElementById("hoverBox").style.color = "lightgreen";
}
function mouseOver() {
  document.getElementById("hoverBox").style.backgroundColor = "lightcoral";
}
</script>
</head>
<body>
<h3>Mouse Hover Example</h3>
<div id="hoverBox" 
        onmouseover="onbeforeprint()" 
        onmouseout="mouseout()"
        style="width:200px;height:100px;background-color:lightcoral;text-align:center;line-height:100px;">Hover over me
</div>
</body>
</html>
